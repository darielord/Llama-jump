<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llama Jump</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="escenario" id="juego-contenedor">
      <span id="puntos">0</span>
      <div id="tigre"></div>
      <div id="obstaculo-arriba"></div>
      <div id="obstaculo-abajo"></div>

      <div class="contador-monedas">
        <img src="monedin-Photoroom.png" alt="moneda" class="moneda-ui" />
        <span id="monedas">x 0</span>
      </div>
    </div>

    <div id="menu-inicio">
      <h2>LLama Jump!</h2>
      <button id="btn-empezar" class="btn-pro">EMPEZAR</button>
      <button id="btn-tienda" class="btn-pro">TIENDA</button>
    </div>

    <div id="menu-tienda">
      <h2>Boutique del Tigre</h2>
      <div class="monedas-tienda">
        <img src="monedin-Photoroom.png" alt="moneda" class="moneda-ui" />
        <span id="saldo-tienda">x 0</span>
      </div>

      <div id="contenedor-items"></div>

      <button id="volver-tienda" class="btn-pro">VOLVER</button>
    </div>
    <div id="gameover-popup">
      <h2>¡Fallaste!</h2>
      <p>Saltos: <span id="puntuacion-final">0</span></p>
      <p>Mejor Racha: <span id="record-final">0</span></p>
      <button id="btn-reiniciar" class="btn-pro">Volver a saltar</button>
      <button id="btn-volver-menu" class="btn-pro">Volver al menú</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
